services:
  annotation-fluent-api:
    build: 
      context: .
      dockerfile: Annotations/DOCKERFILE
    container_name: annotation-fluent-api
    volumes:
      - ./Annotations/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  fluent-api-fluent-api:
    build: 
      context: .
      dockerfile: "Fluent API/DOCKERFILE"
    container_name: fluent-api-fluent-api
    volumes:
      - ./Fluent API/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  inheritance-table-per-class:
    build: 
      context: .
      dockerfile: InheritanceTablePerClass/DOCKERFILE
    container_name: inheritance-table-per-class-fluent-api
    volumes:
      - ./InheritanceTablePerClass/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  inheritance-table-per-hierarchy:
    build: 
      context: .
      dockerfile: InheritanceTablePerHierarchy/DOCKERFILE
    container_name: inheritance-table-per-hierarchy-fluent-api
    volumes:
      - ./InheritanceTablePerHierarchy/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  inheritance-table-per-type:
    build: 
      context: .
      dockerfile: InheritanceTablePerType/DOCKERFILE
    container_name: inheritance-table-per-type-fluent-api
    volumes:
      - ./InheritanceTablePerType/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  many-to-many:
    build: 
      context: .
      dockerfile: Many-to-many/DOCKERFILE
    container_name: many-to-many-fluent-api
    volumes:
      - ./Many-to-many/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db


  one-to-many:
    build: 
      context: .
      dockerfile: One-to-Many/DOCKERFILE
    container_name: one-to-many-fluent-api
    volumes:
      - ./One-to-Many/appsettings.json:/app/appsettings.json:ro
    networks:
      - my-bd-network
    depends_on:
      - postgres_db

  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    
    environment:
      # POSTGRES_DB: appsettings.json will connect them
      POSTGRES_USER: ellina
      POSTGRES_PASSWORD: secret_lesson_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my-bd-network
      
    
    
networks:
  my-bd-network:
    driver: bridge

volumes:
  postgres_data:
    driver: volume